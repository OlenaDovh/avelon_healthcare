services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: avelon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: db1304pgapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env.docker
volumes:
  postgres_data:
